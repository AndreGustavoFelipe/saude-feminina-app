<ion-tabs>

  <ion-tab-bar slot="bottom" class="custom-tabs">

    <ion-tab-button tab="tab1" href="/tabs/tab1">
      <ion-icon name="calendar-outline"></ion-icon>
      <ion-label>Hoje</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="tab2" href="/tabs/tab2">
      <ion-icon name="heart-outline"></ion-icon>
      <ion-label>Ciclo</ion-label>
    </ion-tab-button>

    <ion-tab-button disabled>
    </ion-tab-button>

    <ion-tab-button tab="tab3" href="/tabs/tab3">
      <ion-icon name="book-outline"></ion-icon>
      <ion-label>Conteúdos</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="tab4" href="/tabs/tab4">
      <ion-icon name="person-outline"></ion-icon>
      <ion-label>Perfil</ion-label>
    </ion-tab-button>

  </ion-tab-bar>

  <div class="fab-container">

    <div class="fab-options" [class.open]="isOpen">

      <button class="fab-option pink">
        <ion-icon name="water-outline"></ion-icon>
        Menstruação
      </button>

      <button class="fab-option purple">
        <ion-icon name="document-text-outline"></ion-icon>
        Sintoma
      </button>

      <button class="fab-option blue">
        <ion-icon name="calendar-outline"></ion-icon>
        Evento
      </button>

    </div>

    <button class="fab-main" (click)="toggleFab()">
      <ion-icon [name]="isOpen ? 'close-outline' : 'add-outline'"></ion-icon>
    </button>

  </div>

</ion-tabs>
